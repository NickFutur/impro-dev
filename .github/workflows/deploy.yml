name: Deploy to GitHub Pages

on:
  push:
    branches: [main] # или master, если ваша основная ветка называется master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build # предполагается, что в package.json есть скрипт build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist # укажите вашу папку со сборкой
          publish_branch: gh-pages # ветка, в которую будут коммититься собранные файлы
